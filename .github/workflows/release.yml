name: Release

on:
  release:
    types: [published]

env:
  GO_VERSION: '1.26'

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      ref: ${{ github.ref }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
