# prek hooks configuration
# Run: prek install --hook-type commit-msg --hook-type pre-push

hooks:
  - id: gofmt
    name: gofmt
    entry: gofmt -l -s -w
    files: \.go$
    pass_filenames: true

  - id: goimports
    name: goimports
    entry: goimports -l -w
    files: \.go$
    pass_filenames: true

  - id: go-vet
    name: go vet
    entry: go vet ./...
    files: \.go$
    pass_filenames: false

  - id: golangci-lint
    name: golangci-lint
    entry: golangci-lint run --timeout=5m
    files: \.go$
    pass_filenames: false