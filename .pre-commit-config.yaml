fail_fast: true
repos:
  # Built-in hooks
  - repo: builtin
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: \.md$
      - id: check-toml
      - id: check-yaml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # Commitizen
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.9
    hooks:
      - id: commitizen
      - id: commitizen-branch
        stages: [pre-push]

  # Go hooks (local)
  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        language: system
        entry: gofmt -l -s -w
        files: \.go$
        pass_filenames: true

  - repo: local
    hooks:
      - id: goimports
        name: goimports
        language: system
        entry: goimports -l -w
        files: \.go$
        pass_filenames: true

  - repo: local
    hooks:
      - id: go-vet
        name: go vet
        language: system
        entry: go vet ./...
        files: \.go$
        pass_filenames: false

  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint
        language: system
        entry: golangci-lint run --timeout=5m
        files: \.go$
        pass_filenames: false

  # Markdown hooks (local)
  - repo: local
    hooks:
      - id: rumdl
        name: rumdl fmt & check
        language: system
        entry: rumdl fmt && rumdl check
        files: \.md$
        pass_filenames: true
        require_serial: true