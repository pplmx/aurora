version: "2"

project_name: aurora

env:
  - GO111MODULE=on
  - CGO_ENABLED=0

before:
  hooks:
    - go mod download

builds:
  - id: aurora
    main: ./cmd/aurora
    binary: aurora
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - id: aurora
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  github:
    owner: pplmx
    name: aurora
  name_template: '{{ .Tag }}'
  draft: false
  prerelease: auto

dockers:
  - id: aurora
    image_templates:
      - 'pplmx/aurora:{{ .Tag }}'
      - 'pplmx/aurora:latest'
    dockerfile: Dockerfile
    build_flag_templates:
      - '--platform=linux/amd64'
      - '--platform=linux/arm64'
    goos: linux
    goarch:
      - amd64
      - arm64